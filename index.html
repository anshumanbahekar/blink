<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blink</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <h1>Blink</h1>
    <p class="desc">Blink and you'll miss it. Don't blink.</p>

    <div id="circle">click to start</div>

    <div id="time"></div>
    <div id="label"></div>

    <div class="row">
      <div class="stat"><span id="s-best">—</span><span>best</span></div>
      <div class="stat"><span id="s-avg">—</span><span>avg</span></div>
      <div class="stat"><span id="s-count">0</span><span>tries</span></div>
      <div class="stat"><span id="s-streak">0</span><span>streak</span></div>
    </div>

    <div id="bars"></div>
    <div id="history-label">last 20 attempts</div>

    <button id="reset">reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
